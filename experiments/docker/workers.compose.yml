name: cqdagpcfg-workers

x-cqdagpcfg-worker: &cqdagpcfg-worker
  build:
    context: ../..
    dockerfile: experiments/docker/Dockerfile
  extra_hosts:
    - "host.docker.internal:host-gateway"
  volumes:
    - ../../:/workspace/CQDAGPCFG-Parallel:ro
    - ../../../CQDAGPCFG:/workspace/CQDAGPCFG:ro
    - worker-artifacts:/artifacts

services:
  node-agent:
    <<: *cqdagpcfg-worker
    environment:
      CQPCFG_CONNECT: cqpcfg://${TRACKER_HOST:-host.docker.internal}:${CQPCFG_PORT:-5555}
      CQPCFG_MODEL_CACHE_DIR: /artifacts/model-cache
      CQPCFG_METRICS_DIR: /artifacts/metrics
      CQPCFG_HITS_DIR: /artifacts/hits
      CQPCFG_JOB_BOOTSTRAP_TIMEOUT_SECONDS: ${CQPCFG_JOB_BOOTSTRAP_TIMEOUT_SECONDS:-60}
      CQPCFG_ROLE_REPLY_TIMEOUT_MS: ${CQPCFG_ROLE_REPLY_TIMEOUT_MS:-1000}
      CQPCFG_METRICS_FLUSH_INTERVAL_SECONDS: ${CQPCFG_METRICS_FLUSH_INTERVAL_SECONDS:-0.25}
      CQPCFG_MODEL_JSON_PAGE_CACHE: ${CQPCFG_MODEL_JSON_PAGE_CACHE:-128}
      CQPCFG_HASH_DELAY_SECONDS: ${CQPCFG_HASH_DELAY_SECONDS:-0}
      CQPCFG_WORK_DELAY_SECONDS: ${CQPCFG_WORK_DELAY_SECONDS:-0}
      CQPCFG_MIN_PASSWORD_LENGTH: ${CQPCFG_MIN_PASSWORD_LENGTH:-0}
      CQPCFG_MAX_PASSWORD_LENGTH: ${CQPCFG_MAX_PASSWORD_LENGTH:-0}
      CQPCFG_RESOURCE_CPUS: ${CQPCFG_RESOURCE_CPUS:-}
      CQPCFG_RESOURCE_MEMORY: ${CQPCFG_RESOURCE_MEMORY:-}
      CQPCFG_RESOURCE_GPUS: ${CQPCFG_RESOURCE_GPUS:-}
      CQPCFG_RESOURCE_GPU_MEMORY: ${CQPCFG_RESOURCE_GPU_MEMORY:-}
    command:
      - python
      - experiments/cqpcfg_experiment.py
      - worker

  metrics-exporter:
    <<: *cqdagpcfg-worker
    command:
      - python
      - experiments/cqpcfg_experiment.py
      - metrics
      - --metrics-dir
      - /artifacts/metrics
      - --bind
      - 0.0.0.0
      - --port
      - "9108"
    ports:
      - "${CQPCFG_METRICS_PORT:-9108}:9108"

  prometheus:
    image: prom/prometheus:v2.55.1
    depends_on:
      metrics-exporter:
        condition: service_started
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - worker-prometheus-data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    ports:
      - "${CQPCFG_PROMETHEUS_PORT:-9090}:9090"

  grafana:
    image: grafana/grafana:11.3.0
    depends_on:
      prometheus:
        condition: service_started
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - worker-grafana-data:/var/lib/grafana
    ports:
      - "${CQPCFG_GRAFANA_PORT:-3300}:3000"

volumes:
  worker-artifacts:
  worker-prometheus-data:
  worker-grafana-data:
