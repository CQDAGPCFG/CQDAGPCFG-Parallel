x-cqdagpcfg-service: &cqdagpcfg-service
  build:
    context: ../..
    dockerfile: experiments/docker/Dockerfile
  volumes:
    - ../../:/workspace/CQDAGPCFG-Parallel:ro
    - ../../../CQDAGPCFG:/workspace/CQDAGPCFG:ro
    - artifacts:/artifacts

services:
  prepare:
    <<: *cqdagpcfg-service
    command:
      - sh
      - -lc
      - >
        rm -rf /artifacts/metrics /artifacts/hits /artifacts/outputs-*.json &&
        python experiments/cqpcfg_experiment.py prepare
        --source-model-path ${CQPCFG_SOURCE_MODEL_PATH:-/workspace/CQDAGPCFG/examples/artifacts/rockyou_train/model.json}
        --job-spec-path /artifacts/job-spec.json
        --limit ${CQPCFG_LIMIT:-10000000}
        --target-rank 0
        --target-rank 7

  tracker:
    <<: *cqdagpcfg-service
    depends_on:
      prepare:
        condition: service_completed_successfully
    environment:
      CQPCFG_MODEL_PATH: ${CQPCFG_SOURCE_MODEL_PATH:-/workspace/CQDAGPCFG/examples/artifacts/rockyou_train/model.json}
      CQPCFG_JOB_SPEC_PATH: /artifacts/job-spec.json
      CQPCFG_BIND: cqpcfg://0.0.0.0:5555
      CQPCFG_ADVERTISE_HOST: tracker
      CQPCFG_SOURCE_MODE: structure
      CQPCFG_METRICS_PATH: /artifacts/metrics/tracker.json
      CQPCFG_OUTPUTS_PATH: /artifacts/consumer-outputs.json
      CQPCFG_METRICS_FLUSH_INTERVAL_SECONDS: "0.25"
      CQPCFG_CANDIDATE_SAMPLE_SIZE: "20"
      CQPCFG_CANDIDATE_SAMPLE_MAX_LENGTH: "64"
      CQPCFG_DEMAND_WINDOW: "${CQPCFG_DEMAND_WINDOW:-8192}"
      CQPCFG_MAX_CHUNK_SIZE: "${CQPCFG_MAX_CHUNK_SIZE:-8192}"
      CQPCFG_BATCH_SIZE: "${CQPCFG_BATCH_SIZE:-4096}"
      CQPCFG_MAX_BATCH_PAYLOAD_BYTES: "${CQPCFG_MAX_BATCH_PAYLOAD_BYTES:-1048576}"
      CQPCFG_CHECKPOINT_INTERVAL_RECORDS: "${CQPCFG_CHECKPOINT_INTERVAL_RECORDS:-10000}"
      CQPCFG_CHECKPOINT_PATH: /artifacts/tracker.checkpoint.json
      CQPCFG_CHECKPOINT_STABLE_LOG_PATH: /artifacts/stable-records.jsonl
      CQPCFG_BATCH_CHECKPOINT_PATH: /artifacts/batch.checkpoint.json
    command: python experiments/cqpcfg_experiment.py tracker
    ports:
      - "5555:5555"
      - "5556:5556"
      - "5557:5557"
      - "5558:5558"
      - "5559:5559"

  node-late:
    <<: *cqdagpcfg-service
    profiles:
      - fault
    depends_on:
      tracker:
        condition: service_started
    environment:
      CQPCFG_CONNECT: cqpcfg://tracker:5555
      CQPCFG_MODEL_CACHE_DIR: /artifacts/model-cache
      CQPCFG_JOB_BOOTSTRAP_TIMEOUT_SECONDS: "60"
      CQPCFG_ROLE_REPLY_TIMEOUT_MS: "1000"
      CQPCFG_METRICS_FLUSH_INTERVAL_SECONDS: "0.25"
      CQPCFG_NODE_ID: node-late
      CQPCFG_METRICS_PATH: /artifacts/metrics/node-late.json
      CQPCFG_OUTPUTS_PATH: /artifacts/outputs-node-late.json
    command: python experiments/cqpcfg_experiment.py worker

  metrics-exporter:
    <<: *cqdagpcfg-service
    depends_on:
      tracker:
        condition: service_started
    command:
      - python
      - experiments/cqpcfg_experiment.py
      - metrics
      - --metrics-dir
      - /artifacts/metrics
      - --bind
      - 0.0.0.0
      - --port
      - "9108"
    ports:
      - "9108:9108"

  prometheus:
    image: prom/prometheus:v2.55.1
    depends_on:
      metrics-exporter:
        condition: service_started
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:11.3.0
    depends_on:
      prometheus:
        condition: service_started
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3300:3000"

volumes:
  artifacts:
  grafana-data:
  prometheus-data:
