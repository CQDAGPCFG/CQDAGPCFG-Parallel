stream {
    upstream cqpcfg_control {
        server 127.0.0.1:5555;
    }

    upstream cqpcfg_batch {
        server 127.0.0.1:5556;
    }

    upstream cqpcfg_role {
        server 127.0.0.1:5557;
    }

    upstream cqpcfg_ack {
        server 127.0.0.1:5558;
    }

    upstream cqpcfg_model {
        server 127.0.0.1:5559;
    }

    server {
        listen 15555;
        proxy_connect_timeout 5s;
        proxy_timeout 1h;
        proxy_pass cqpcfg_control;
    }

    server {
        listen 15556;
        proxy_connect_timeout 5s;
        proxy_timeout 1h;
        proxy_pass cqpcfg_batch;
    }

    server {
        listen 15557;
        proxy_connect_timeout 5s;
        proxy_timeout 1h;
        proxy_pass cqpcfg_role;
    }

    server {
        listen 15558;
        proxy_connect_timeout 5s;
        proxy_timeout 1h;
        proxy_pass cqpcfg_ack;
    }

    server {
        listen 15559;
        proxy_connect_timeout 5s;
        proxy_timeout 1h;
        proxy_pass cqpcfg_model;
    }
}
